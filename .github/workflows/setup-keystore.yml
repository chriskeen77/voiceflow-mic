name: Setup signing keystore (run once)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate debug keystore if missing
        run: |
          if [ -f app/debug.keystore ]; then
            echo "keystore already exists, nothing to do"
            exit 0
          fi
          keytool -genkeypair -keystore app/debug.keystore \
            -storepass android -keypass android -alias androiddebugkey \
            -dname "CN=VoiceFlow Mic" -keyalg RSA -keysize 2048 -validity 10000
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/debug.keystore
          git commit -m "Add stable debug keystore for consistent APK signatures"
          git push
