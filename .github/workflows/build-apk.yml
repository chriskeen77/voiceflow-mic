name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk VoiceFlowMic.apk

      - uses: actions/upload-artifact@v4
        with:
          name: VoiceFlowMic-apk
          path: VoiceFlowMic.apk

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: VoiceFlow Mic APK
          body: "Download VoiceFlowMic.apk on your Android phone and open it to install. See README for setup."
          files: VoiceFlowMic.apk
